version: "3.8"

services:
  db:
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salary_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: backend-app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/salary_db
    restart: always

    
